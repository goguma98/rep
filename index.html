  ],
};

const MAX_WEEK = Math.max(...Object.keys(PROGRAM).map(Number));
const TOTAL_WEEKS = 12;

/* ---------- LOCAL STORAGE ---------- */
const STORAGE_KEY = "workout_state_v4";
const DEFAULT_CURRENT_WEEK = 3;

const loadState = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { view: "home", currentWeek: DEFAULT_CURRENT_WEEK, week: MAX_WEEK, day: 0, done: {}, memos: {} };
    const s = JSON.parse(raw);
    return {
      view: s.view ?? "home",
      currentWeek: Math.min(Math.max(s.currentWeek ?? DEFAULT_CURRENT_WEEK, 1), TOTAL_WEEKS),
      week: Math.min(s.week ?? MAX_WEEK, MAX_WEEK),
      day: s.day ?? 0,
      done: s.done ?? {},
      memos: s.memos ?? {},
    };
  } catch {
    return { view: "home", currentWeek: DEFAULT_CURRENT_WEEK, week: MAX_WEEK, day: 0, done: {}, memos: {} };
  }
};

const saveState = (s) => {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  } catch {}
};

/* ---------- UTILS ---------- */
const todayStr = () => {
  const d = new Date();
  const yy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yy}/${mm}/${dd}`;
};

const homeDateStr = () => {
  const d = new Date();
  const days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  return `${days[d.getDay()]} · ${months[d.getMonth()]} ${d.getDate()}`;
};

const renderWeight = (w) => {
  if (w === "—" || !w) return null;
  return /^[\d.]+$/.test(w) ? `${w} kg` : w;
};

const blockOf = (week) => Math.ceil(week / 4);

// Session = complete when all exercises + cardio are done
const isSessionComplete = (w, d, done) => {
  const exs = PROGRAM[w]?.[d];
  if (!exs) return false;
  const total = exs.length + 1; // exercises + cardio
  for (let i = 0; i < total; i++) {
    if (!done[`${w}_${d}_${i}`]) return false;
  }
  return true;
};

// Find first incomplete session within a specific week (currentWeek-based)
const findTodayInWeek = (w, done) => {
  if (!PROGRAM[w]) return null;
  for (let d = 0; d < 4; d++) {
    if (!isSessionComplete(w, d, done)) return { week: w, day: d };
  }
  // All sessions complete this week — point to last day
  return { week: w, day: 3, allDone: true };
};

// Session immediately before given session — skips weeks without data
const findLastBefore = (current, done) => {
  if (!current) return null;
  let w = current.week;
  let d = current.day - 1;
  while (true) {
    if (d < 0) {
      d = 3;
      w -= 1;
    }
    if (w < 1) return null;
    if (PROGRAM[w]) return { week: w, day: d };
    w -= 1;
    d = 3;
  }
};

// Find first incomplete day within a specific week
const firstIncompleteDayIn = (week, done) => {
  if (!PROGRAM[week]) return 0;
  for (let d = 0; d < 4; d++) {
    if (!isSessionComplete(week, d, done)) return d;
  }
  return 0;
};

/* ---------- MAIN ---------- */
function App() {
  const [state, setState] = useState(loadState);
  const [copyOpen, setCopyOpen] = useState(false);
  const [copyText, setCopyText] = useState("");
  const [copyStatus, setCopyStatus] = useState("");
  const [memoVisible, setMemoVisible] = useState({});
  const copyTextareaRef = useRef(null);

  const { view, week, day, done, memos } = state;

  useEffect(() => saveState(state), [state]);

  const goHome = () => setState((s) => ({ ...s, view: "home" }));
  const goTracker = (w, d) => setState((s) => ({ ...s, view: "tracker", week: w, day: d }));

  // ---------- HOME VIEW ----------
  if (view === "home") {
    const cw = state.currentWeek;
    const today = findTodayInWeek(cw, done);
    const last = findLastBefore(today ?? { week: cw, day: 0 }, done);

    return (
      <HomeScreen
        currentWeek={cw}
        today={today}
        last={last}
        done={done}
        onStartToday={() => today && goTracker(today.week, today.day)}
        onTapLast={() => last && goTracker(last.week, last.day)}
        onTapWeek={(w) => {
          if (!PROGRAM[w] || w === cw) return;
          setState((s) => ({ ...s, currentWeek: w }));
        }}
        onPrevWeek={() => {
          const t = cw - 1;
          if (t >= 1 && PROGRAM[t]) setState((s) => ({ ...s, currentWeek: t }));
        }}
        onNextWeek={() => {
          const t = cw + 1;
          if (t <= TOTAL_WEEKS && PROGRAM[t]) setState((s) => ({ ...s, currentWeek: t }));
        }}
      />
    );
  }

  // ---------- TRACKER VIEW ----------
  const exercises = PROGRAM[week][day];
  const cardio = cardioFor(day);

  const toggleMemo = (i) => {
    const key = `${week}_${day}_${i}`;
    setMemoVisible((v) => ({ ...v, [key]: !v[key] }));
  };

  const setWeek = (w) => {
    if (w < 1 || w > MAX_WEEK) return;
    setState((s) => ({ ...s, week: w }));
  };
  const setDay = (d) => setState((s) => ({ ...s, day: d }));

  const toggleDone = (i) => {
    const key = `${week}_${day}_${i}`;
    setState((s) => ({
      ...s,
      done: { ...s.done, [key]: !s.done[key] },
    }));
  };

  const setMemo = (i, val) => {
    const key = `${week}_${day}_${i}`;
    setState((s) => ({
      ...s,
      memos: { ...s.memos, [key]: val },
    }));
  };

  const resetDay = () => {
    if (!window.confirm(`W${String(week).padStart(2, "0")} ${DAYS[day].code} 체크 / 메모 초기화?`)) return;
    setState((s) => {
      const newDone = { ...s.done };
      const newMemos = { ...s.memos };
      for (let i = 0; i < exercises.length + 1; i++) {
        delete newDone[`${week}_${day}_${i}`];
        delete newMemos[`${week}_${day}_${i}`];
      }
      return { ...s, done: newDone, memos: newMemos };
    });
  };

  const buildCopyText = () => {
    const lines = [
      `W${String(week).padStart(2, "0")} ${DAYS[day].code} (${todayStr()})`,
    ];
    exercises.forEach((ex, i) => {
      const [name, sets, weight, note] = ex;
      const w = renderWeight(weight);
      const parts = [name, sets];
      if (w) parts.push(w);
      if (note) parts.push(note);
      const userMemo = memos[`${week}_${day}_${i}`];
      let line = `- ${parts.join(" / ")} → `;
      if (userMemo) line += userMemo;
      lines.push(line);
    });
    const [cName, cTime, , cNote] = cardio;
    const cardioMemo = memos[`${week}_${day}_${exercises.length}`];
    let cardioLine = `- ${cName} / ${cTime} / ${cNote} → `;
    if (cardioMemo) cardioLine += cardioMemo;
    lines.push(cardioLine);
    return lines.join("\n");
  };

  const handleCopy = () => {
    const text = buildCopyText();
    setCopyText(text);
    setCopyOpen(true);
    setCopyStatus("");
    if (navigator.clipboard?.writeText) {
      navigator.clipboard
        .writeText(text)
        .then(() => setCopyStatus("자동 복사됨 ✓"))
        .catch(() => setCopyStatus(""));
    }
    setTimeout(() => {
      if (copyTextareaRef.current) {
        copyTextareaRef.current.focus();
        copyTextareaRef.current.select();
      }
    }, 50);
  };

  const handleCopyButtonInModal = () => {
    if (copyTextareaRef.current) {
      copyTextareaRef.current.focus();
      copyTextareaRef.current.select();
      try {
        const ok = document.execCommand("copy");
        setCopyStatus(ok ? "복사됨 ✓" : "Cmd/Ctrl+C 또는 길게 눌러서 복사");
      } catch {
        setCopyStatus("Cmd/Ctrl+C 또는 길게 눌러서 복사");
      }
    }
  };

  return (
    <div className="page-outer" style={{ color: TEXT, ...sansStyle }}>
      <SharedStyles />

      <div className="page-shell">
        <div className="page-glow" />

        <div style={{ position: "relative", zIndex: 1, padding: "18px 14px 80px" }}>
          {/* Top bar with REP logo → home */}
          <div
            style={{
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              marginBottom: "18px",
            }}
          >
            <button
              onClick={goHome}
              className="tap"
              style={{
                background: "transparent",
                border: "none",
                padding: "4px 2px",
                cursor: "pointer",
                display: "flex",
                alignItems: "baseline",
                gap: "4px",
              }}
            >
              <span
                style={{
                  ...sansStyle,
                  fontSize: "22px",
                  fontWeight: 800,
                  color: ACCENT,
                  letterSpacing: "-0.04em",
                }}
              >
                REP
              </span>
              <span
                style={{
                  ...sansStyle,
                  fontSize: "9px",
                  fontWeight: 500,
                  color: ACCENT,
                  marginLeft: "-2px",
                }}
              >
                ®
              </span>
            </button>
            <div
              style={{
                ...monoStyle,
                fontSize: "10px",
                color: TEXT_FAINT,
                letterSpacing: "0.1em",
              }}
            >
              {homeDateStr()}
            </div>
          </div>

          {/* Week nav */}
          <div
            style={{
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              marginBottom: "18px",
              gap: "6px",
            }}
          >
            <button
              onClick={() => setWeek(week - 1)}
              disabled={week === 1}
              className="tap"
              style={{
                flex: "0 0 auto",
                background: "transparent",
                border: `1px solid ${BORDER}`,
                color: week === 1 ? TEXT_FAINT : TEXT_DIM,
                padding: "11px 12px",
                borderRadius: "10px",
                cursor: week === 1 ? "not-allowed" : "pointer",
                display: "flex",
                alignItems: "center",
                gap: "3px",
                ...monoStyle,
                fontSize: "11px",
                fontWeight: 600,
                minWidth: "66px",
                justifyContent: "center",
                opacity: week === 1 ? 0.4 : 1,
              }}
            >
              <ChevronLeft size={14} strokeWidth={2.5} />
              {week === 1 ? "—" : `W${String(week - 1).padStart(2, "0")}`}
            </button>

            <div
              style={{
                flex: "1",
                textAlign: "center",
                padding: "11px 0",
                background: ACCENT_GLOW,
                border: `1.5px solid ${BORDER_ACCENT}`,
                borderRadius: "10px",
                ...monoStyle,
                fontSize: "17px",
                fontWeight: 700,
                color: ACCENT,
                letterSpacing: "0.06em",
                boxShadow: `0 0 24px ${ACCENT_GLOW}`,
              }}
            >
              W{String(week).padStart(2, "0")}
            </div>

            <button
              onClick={() => setWeek(week + 1)}
              disabled={week >= MAX_WEEK}
              className="tap"
              style={{
                flex: "0 0 auto",
                background: "transparent",
                border: `1px solid ${BORDER}`,
                color: week >= MAX_WEEK ? TEXT_FAINT : TEXT_DIM,
                padding: "11px 12px",
                borderRadius: "10px",
                cursor: week >= MAX_WEEK ? "not-allowed" : "pointer",
                display: "flex",
                alignItems: "center",
                gap: "3px",
                ...monoStyle,
                fontSize: "11px",
                fontWeight: 600,
                minWidth: "66px",
                justifyContent: "center",
                opacity: week >= MAX_WEEK ? 0.4 : 1,
              }}
            >
              {week >= MAX_WEEK ? "—" : `W${String(week + 1).padStart(2, "0")}`}
              <ChevronRight size={14} strokeWidth={2.5} />
            </button>
          </div>

          {/* Day tabs */}
          <div
            style={{
              display: "grid",
              gridTemplateColumns: "repeat(4, 1fr)",
              gap: "6px",
              marginBottom: "22px",
            }}
          >
            {DAYS.map((d, i) => {
              const active = day === i;
              return (
                <button
                  key={d.code}
                  onClick={() => setDay(i)}
                  className="tap"
                  style={{
                    background: active ? ACCENT : "transparent",
                    border: `1px solid ${active ? ACCENT : BORDER}`,
                    color: active ? TEXT_ON_ACCENT : TEXT_DIM,
                    padding: "11px 0",
                    borderRadius: "10px",
                    cursor: "pointer",
                    ...monoStyle,
                    fontSize: "12px",
                    fontWeight: active ? 700 : 500,
                    letterSpacing: "0.06em",
                  }}
                >
                  {d.code}
                </button>
              );
            })}
          </div>

          {/* Session header */}
          <div style={{ marginBottom: "14px", padding: "0 2px" }}>
            <div
              style={{
                fontSize: "21px",
                fontWeight: 700,
                color: TEXT,
                letterSpacing: "-0.015em",
              }}
            >
              {DAYS[day].name}
            </div>
            <div
              style={{
                fontSize: "12px",
                color: TEXT_DIM,
                marginTop: "3px",
              }}
            >
              {DAYS[day].focus}
            </div>
          </div>

          {/* Exercise cards */}
          <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
            {exercises.map((ex, i) => {
              const [name, sets, weight, defaultNote] = ex;
              const key = `${week}_${day}_${i}`;
              const isDone = !!done[key];
              const memoText = memos[key] ?? "";
              const hasMemo = !!memoText;
              const isMemoOpen = !!memoVisible[key];

              return (
                <ExerciseCard
                  key={key}
                  num={i + 1}
                  name={name}
                  sets={sets}
                  weightStr={renderWeight(weight)}
                  defaultNote={defaultNote}
                  isDone={isDone}
                  memo={memoText}
                  hasMemo={hasMemo}
                  memoOpen={isMemoOpen}
                  onToggle={() => toggleDone(i)}
                  onMemoToggle={() => toggleMemo(i)}
                  onMemoChange={(v) => setMemo(i, v)}
                />
              );
            })}

            {/* Cardio */}
            <CardioCard
              cardio={cardio}
              isDone={!!done[`${week}_${day}_${exercises.length}`]}
              onToggle={() => toggleDone(exercises.length)}
              memo={memos[`${week}_${day}_${exercises.length}`] ?? ""}
              hasMemo={!!memos[`${week}_${day}_${exercises.length}`]}
              memoOpen={!!memoVisible[`${week}_${day}_${exercises.length}`]}
              onMemoToggle={() => toggleMemo(exercises.length)}
              onMemoChange={(v) => setMemo(exercises.length, v)}
            />
          </div>

          {/* Actions */}
          <div
            style={{
              display: "flex",
              gap: "8px",
              marginTop: "22px",
            }}
          >
            <button
              onClick={handleCopy}
              className="tap"
              style={{
                flex: 1,
                background: "transparent",
                color: ACCENT,
                border: `1px solid ${BORDER_ACCENT}`,
                padding: "12px 0",
                borderRadius: "10px",
                cursor: "pointer",
                ...monoStyle,
                fontSize: "11px",
                fontWeight: 700,
                letterSpacing: "0.14em",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                gap: "8px",
              }}
            >
              <Copy size={12} strokeWidth={2.5} />
              세션 복사
            </button>
            <button
              onClick={resetDay}
              className="tap"
              style={{
                flex: "0 0 auto",
                background: "transparent",
                border: `1px solid ${BORDER}`,
                color: TEXT_DIM,
                padding: "12px 16px",
                borderRadius: "10px",
                cursor: "pointer",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
              }}
            >
              <RotateCcw size={12} strokeWidth={2.5} />
            </button>
          </div>

          {/* Footer hint */}
          <div
            style={{
              ...monoStyle,
              fontSize: "10px",
              color: TEXT_FAINT,
              textAlign: "center",
              marginTop: "30px",
              letterSpacing: "0.08em",
              lineHeight: 1.6,
            }}
          >
            다음 주차는 채팅에서 합의 후 추가
          </div>
        </div>
      </div>

      {/* Copy modal */}
      {copyOpen && (
        <div
          onClick={() => setCopyOpen(false)}
          style={{
            position: "fixed",
            inset: 0,
            background: "rgba(0,0,0,0.7)",
            display: "flex",
            alignItems: "flex-end",
            justifyContent: "center",
            zIndex: 100,
            backdropFilter: "blur(4px)",
          }}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            className="modal-in"
            style={{
              width: "100%",
              maxWidth: "420px",
              background: CARD_BG,
              borderTopLeftRadius: "20px",
              borderTopRightRadius: "20px",
              borderTop: `1px solid ${BORDER_ACCENT}`,
              padding: "18px 16px 24px",
              maxHeight: "85vh",
              display: "flex",
              flexDirection: "column",
            }}
          >
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
                marginBottom: "14px",
              }}
            >
              <div
                style={{
                  ...monoStyle,
                  fontSize: "11px",
                  letterSpacing: "0.2em",
                  color: ACCENT,
                  fontWeight: 700,
                }}
              >
                SESSION COPY
              </div>
              <button
                onClick={() => setCopyOpen(false)}
                className="tap"
                style={{
                  background: "transparent",
                  border: "none",
                  color: TEXT_DIM,
                  padding: "4px",
                  cursor: "pointer",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                }}
              >
                <X size={18} strokeWidth={2.5} />
              </button>
            </div>

            <textarea
              ref={copyTextareaRef}
              value={copyText}
              readOnly
              style={{
                width: "100%",
                flex: 1,
                minHeight: "240px",
                background: BG,
                border: `1px solid ${BORDER}`,
                borderRadius: "10px",
                color: TEXT,
                padding: "12px 14px",
                fontSize: "12.5px",
                lineHeight: 1.7,
                resize: "none",
                ...monoStyle,
              }}
              onFocus={(e) => e.target.select()}
            />

            <div
              style={{
                display: "flex",
                gap: "8px",
                marginTop: "12px",
                alignItems: "center",
              }}
            >
              <button
                onClick={handleCopyButtonInModal}
                className="tap"
                style={{
                  flex: 1,
                  background: ACCENT,
                  color: TEXT_ON_ACCENT,
                  border: "none",
                  padding: "13px 0",
                  borderRadius: "10px",
                  cursor: "pointer",
                  ...monoStyle,
                  fontSize: "12px",
                  fontWeight: 800,
                  letterSpacing: "0.1em",
                }}
              >
                COPY
              </button>
              {copyStatus && (
                <div
                  style={{
                    ...monoStyle,
                    fontSize: "11px",
                    color: ACCENT,
                    flex: "0 0 auto",
                    fontWeight: 600,
                  }}
                >
                  {copyStatus}
                </div>
              )}
            </div>

            <div
              style={{
                ...monoStyle,
                fontSize: "10px",
                color: TEXT_FAINT,
                marginTop: "10px",
                textAlign: "center",
                lineHeight: 1.5,
              }}
            >
              안 되면 텍스트 길게 눌러서 전체 선택 → 복사
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- SHARED STYLES ---------- */

    <style>{`
      @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      body { margin: 0; background: #07070A; }
      .page-outer {
        min-height: 100vh;
        min-height: 100dvh;
        background: #07070A;
        display: flex;
        justify-content: center;
      }
      .page-shell {
        width: 100%;
        max-width: 440px;
        background: ${BG};
        min-height: 100vh;
        min-height: 100dvh;
        position: relative;
        overflow: hidden;
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.05),
          0 0 40px rgba(0,0,0,0.5),
          0 0 100px rgba(241,255,10,0.03);
      }
      @media (max-width: 440px) {
        .page-shell { box-shadow: none; }
      }
      .page-glow {
        position: absolute;
        top: -80px;
        left: 50%;
        transform: translateX(-50%);
        width: 360px;
        height: 260px;
        background: radial-gradient(ellipse, ${ACCENT_GLOW} 0%, transparent 65%);
        pointer-events: none;
        z-index: 0;
        filter: blur(20px);
      }
      button { font-family: inherit; }

      textarea:focus { outline: none; border-color: ${ACCENT_DIM} !important; }
      .tap { transition: opacity 0.15s, transform 0.15s; }
      .tap:active { opacity: 0.6; transform: scale(0.98); }
      @keyframes slide {
        from { opacity: 0; transform: translateY(-4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-up {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }

/* ---------- HOME SCREEN ---------- */
function HomeScreen({ currentWeek, today, last, done, onStartToday, onTapLast, onTapWeek, onPrevWeek, onNextWeek }) {
  const week = currentWeek;
  const todayDay = today ? DAYS[today.day] : null;
  const lastDay = last ? DAYS[last.day] : null;
  const exCount = today ? (PROGRAM[today.week]?.[today.day]?.length ?? 6) : 6;
  // rough time estimate: 8 min/exercise + 12 min cardio
  const timeEst = exCount * 8 + 12;
  const block = blockOf(week);

  const canPrev = week > 1 && !!PROGRAM[week - 1];
  const canNext = week < TOTAL_WEEKS && !!PROGRAM[week + 1];

  // 5-week window centered on currentWeek
  const visibleWeeks = [-2, -1, 0, 1, 2].map((o) => week + o);

  return (
    <div className="page-outer home-in" style={{ color: TEXT, ...sansStyle }}>
      <SharedStyles />

      <div className="page-shell">
        <div className="page-glow" />

        <div style={{ position: "relative", zIndex: 1, padding: "26px 22px 80px" }}>
          {/* ===== HEADER ===== */}
          <div
            style={{
              display: "flex",
              alignItems: "flex-start",
              justifyContent: "space-between",
              marginBottom: "28px",
            }}
          >
            <div style={{ display: "flex", alignItems: "baseline", gap: "4px" }}>
              <span
                style={{
                  ...sansStyle,
                  fontSize: "36px",
                  fontWeight: 800,
                  color: ACCENT,
                  letterSpacing: "-0.05em",
                  lineHeight: 1,
                }}
              >
                REP
              </span>
              <span
                style={{
                  ...sansStyle,
                  fontSize: "13px",
                  fontWeight: 500,
                  color: ACCENT,
                  alignSelf: "flex-start",
                  marginTop: "2px",
                }}
              >
                ®
              </span>
            </div>
            <div
              style={{
                ...monoStyle,
                fontSize: "10px",
                color: TEXT_FAINT,
                letterSpacing: "0.1em",
                marginTop: "6px",
              }}
            >
              {homeDateStr()}
            </div>
          </div>

          {/* ===== META BLOCK ===== */}
          <div style={{ marginBottom: "20px", ...monoStyle, fontSize: "11px", letterSpacing: "0.05em" }}>
            <div style={{ color: TEXT_DIM, marginBottom: "6px" }}>JAWON</div>
            <div style={{ color: TEXT_DIM, marginBottom: "6px" }}>
              WEEK <span style={{ color: ACCENT, fontWeight: 600 }}>{String(week).padStart(2, "0")}</span>
              {" / "}{TOTAL_WEEKS} · BLOCK {block}
            </div>
            <div style={{ color: TEXT_DIM }}>UPPER · LOWER · 4 D/WK</div>
          </div>

          {/* Divider */}
          <div
            style={{
              height: "1px",
              background: BORDER_SOFT,
              margin: "0 -22px 22px",
            }}
          />

          {/* ===== WEEK PILLS ===== */}
          <div
            style={{
              display: "flex",
              gap: "6px",
              marginBottom: "28px",
              alignItems: "stretch",
            }}
          >
            {/* Prev arrow */}
            <button
              onClick={canPrev ? onPrevWeek : undefined}
              disabled={!canPrev}
              className={canPrev ? "tap" : ""}
              style={{
                flex: "0 0 auto",
                width: "24px",
                background: "transparent",
                border: "none",
                color: canPrev ? TEXT_DIM : TEXT_FAINT,
                cursor: canPrev ? "pointer" : "default",
                padding: 0,
                ...monoStyle,
                fontSize: "18px",
                fontWeight: 400,
                opacity: canPrev ? 1 : 0.25,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
              }}
            >
              ‹
            </button>

            {/* Pills (5-week window) */}
            {visibleWeeks.map((w, idx) => {
              const isActive = w === week;
              const isInRange = w >= 1 && w <= TOTAL_WEEKS;
              const hasData = isInRange && !!PROGRAM[w];
              const clickable = hasData && !isActive;

              if (!isInRange) {
                return <div key={idx} style={{ flex: 1 }} />;
              }

              return (
                <button
                  key={idx}
                  onClick={() => clickable && onTapWeek(w)}
                  disabled={!clickable && !isActive}
                  className={clickable ? "tap" : ""}
                  style={{
                    flex: 1,
                    background: isActive ? "rgba(241,255,10,0.05)" : "transparent",
                    border: `1px solid ${
                      isActive
                        ? BORDER_ACCENT_STRONG
                        : hasData
                        ? BORDER_SOFT
                        : BORDER
                    }`,
                    color: isActive ? ACCENT : hasData ? TEXT_DIM : TEXT_FAINT,
                    opacity: hasData || isActive ? 1 : 0.45,
                    padding: "10px 0",
                    borderRadius: "10px",
                    cursor: clickable ? "pointer" : "default",
                    ...monoStyle,
                    fontSize: "11px",
                    fontWeight: isActive ? 700 : 500,
                    letterSpacing: "0.08em",
                    textAlign: "center",
                  }}
                >
                  W{String(w).padStart(2, "0")}
                </button>
              );
            })}

            {/* Next arrow */}
            <button
              onClick={canNext ? onNextWeek : undefined}
              disabled={!canNext}
              className={canNext ? "tap" : ""}
              style={{
                flex: "0 0 auto",
                width: "24px",
                background: "transparent",
                border: "none",
                color: canNext ? TEXT_DIM : TEXT_FAINT,
                cursor: canNext ? "pointer" : "default",
                padding: 0,
                ...monoStyle,
                fontSize: "18px",
                fontWeight: 400,
                opacity: canNext ? 1 : 0.25,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
              }}
            >
              ›
            </button>
          </div>

          {/* ===== TODAY CARD ===== */}
          {todayDay && (
          <div
            style={{
              background: "rgba(241,255,10,0.04)",
              border: `1px solid ${BORDER_ACCENT_STRONG}`,
              borderRadius: "16px",
              padding: "22px 22px 22px",
              marginBottom: "14px",
              boxShadow: `0 0 32px rgba(241,255,10,0.06)`,
            }}
          >
            {/* Header row */}
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
                marginBottom: "16px",
              }}
            >
              <span
                style={{
                  ...monoStyle,
                  fontSize: "10px",
                  color: ACCENT,
                  letterSpacing: "0.22em",
                  fontWeight: 600,
                }}
              >
                {todayDay.code} · TODAY
              </span>
              <span
                style={{
                  ...monoStyle,
                  fontSize: "10px",
                  color: ACCENT_DIM,
                  letterSpacing: "0.1em",
                }}
              >
                ~{timeEst} MIN · {exCount} EX
              </span>
            </div>

            {/* Title */}
            <div
              style={{
                fontSize: "26px",
                fontWeight: 700,
                color: ACCENT,
                letterSpacing: "-0.02em",
                lineHeight: 1.15,
                marginBottom: "6px",
              }}
            >
              {todayDay.name}
            </div>

            {/* Subtitle */}
            <div
              style={{
                fontSize: "13px",
                color: ACCENT_DIM,
                marginBottom: "22px",
                lineHeight: 1.4,
              }}
            >
              {todayDay.focus}
            </div>

            {/* START button */}
            <button
              onClick={onStartToday}
              className="tap"
              style={{
                width: "100%",
                background: ACCENT,
                color: TEXT_ON_ACCENT,
                border: "none",
                padding: "15px 0",
                borderRadius: "10px",
                cursor: "pointer",
                ...monoStyle,
                fontSize: "13px",
                fontWeight: 700,
                letterSpacing: "0.18em",
              }}
            >
              START →
            </button>
          </div>
          )}

          {/* ===== LAST CARD ===== */}
          {last && (
            <button
              onClick={onTapLast}
              className="tap"
              style={{
                width: "100%",
                background: "rgba(255,255,255,0.02)",
                border: `1px solid ${BORDER_SOFT}`,
                borderRadius: "16px",
                padding: "18px 22px",
                textAlign: "left",
                cursor: "pointer",
                color: "inherit",
                display: "block",
              }}
            >
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  marginBottom: "10px",
                }}
              >
                <span
                  style={{
                    ...monoStyle,
                    fontSize: "10px",
                    color: TEXT_DIM,
                    letterSpacing: "0.22em",
                    fontWeight: 600,
                  }}
                >
                  {lastDay.code} · LAST
                </span>
                <span
                  style={{
                    ...monoStyle,
                    fontSize: "10px",
                    color: TEXT_FAINT,
                    letterSpacing: "0.1em",
                  }}
                >
                  W{String(last.week).padStart(2, "0")}
                </span>
              </div>
              <div
                style={{
                  fontSize: "19px",
                  fontWeight: 600,
                  color: "rgba(255,255,255,0.85)",
                  letterSpacing: "-0.015em",
                  marginBottom: "4px",
                }}
              >
                {lastDay.name}
              </div>
              <div
                style={{
                  fontSize: "12px",
                  color: TEXT_DIM,
                }}
              >
                {lastDay.focus}
              </div>
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------- EXERCISE CARD ---------- */
function ExerciseCard({
  num,
  name,
  sets,
  weightStr,
  defaultNote,
  isDone,
  memo,
  hasMemo,
  memoOpen,
  onToggle,
  onMemoToggle,
  onMemoChange,
}) {
  const infoActive = hasMemo || memoOpen;
  return (
    <div
      style={{
        background: isDone ? CARD_BG_DONE : CARD_BG,
        border: `1px solid ${isDone ? BORDER_ACCENT : BORDER}`,
        borderRadius: "12px",
        overflow: "hidden",
        transition: "background 0.2s, border-color 0.2s",
      }}
    >
      <div
        style={{
          display: "flex",
          alignItems: "center",
          padding: "13px 13px",
          gap: "10px",
        }}
      >
        {/* Number */}
        <div
          style={{
            flex: "0 0 auto",
            width: "22px",
            ...monoStyle,
            fontSize: "11px",
            color: isDone ? ACCENT_FAINT : TEXT_FAINT,
            textAlign: "center",
            fontWeight: 700,
          }}
        >
          {String(num).padStart(2, "0")}
        </div>

        {/* Content (tap to toggle done) */}
        <button
          onClick={onToggle}
          className="tap"
          style={{
            flex: 1,
            background: "transparent",
            border: "none",
            color: "inherit",
            padding: 0,
            textAlign: "left",
            cursor: "pointer",
            minWidth: 0,
          }}
        >
          <div
            style={{
              fontSize: "15px",
              fontWeight: 600,
              color: isDone ? TEXT_DIM : TEXT,
              textDecoration: isDone ? "line-through" : "none",
              textDecorationColor: ACCENT_FAINT,
              letterSpacing: "-0.01em",
              marginBottom: "3px",
              whiteSpace: "nowrap",
              overflow: "hidden",
              textOverflow: "ellipsis",
            }}
          >
            {name}
          </div>
          <div
            style={{
              ...monoStyle,
              fontSize: "12px",
              color: isDone ? TEXT_FAINT : TEXT_DIM,
              display: "flex",
              gap: "8px",
              alignItems: "center",
            }}
          >
            <span>{sets}</span>
            {weightStr && (
              <>
                <span style={{ color: TEXT_FAINT }}>·</span>
                <span
                  style={{
                    color: isDone ? ACCENT_FAINT : ACCENT,
                    fontWeight: 600,
                  }}
                >
                  {weightStr}
                </span>
              </>
            )}
          </div>
          {defaultNote && (
            <div
              style={{
                fontSize: "11px",
                color: TEXT_FAINT,
                marginTop: "4px",
                lineHeight: 1.4,
              }}
            >
              {defaultNote}
            </div>
          )}
        </button>

        {/* Memo toggle */}
        <button
          onClick={onMemoToggle}
          className="tap"
          style={{
            flex: "0 0 auto",
            background: "transparent",
            border: "none",
            color: infoActive ? ACCENT : TEXT_FAINT,
            padding: "6px",
            cursor: "pointer",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            position: "relative",
          }}
        >
          <Info size={16} strokeWidth={2} />
          {hasMemo && !memoOpen && (
            <span
              style={{
                position: "absolute",
                top: "4px",
                right: "4px",
                width: "5px",
                height: "5px",
                borderRadius: "50%",
                background: ACCENT,
              }}
            />
          )}
        </button>

        {/* Check */}
        <div
          onClick={onToggle}
          style={{
            flex: "0 0 auto",
            width: "26px",
            height: "26px",
            borderRadius: "8px",
            border: `1.5px solid ${isDone ? ACCENT : "rgba(255,255,255,0.18)"}`,
            background: isDone ? ACCENT : "transparent",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            cursor: "pointer",
            transition: "all 0.2s",
            boxShadow: isDone ? `0 0 12px ${ACCENT_GLOW}` : "none",
          }}
        >
          {isDone && <Check size={16} color={TEXT_ON_ACCENT} strokeWidth={3.5} />}
        </div>
      </div>

      {/* Memo input */}
      {memoOpen && (
        <div
          className="slide"
          style={{
            padding: "0 13px 13px",
            borderTop: `1px solid ${BORDER}`,
            paddingTop: "12px",
          }}
        >
          <textarea
            autoFocus
            value={memo}
            onChange={(e) => onMemoChange(e.target.value)}
            placeholder="실제 한 거 / 느낌 / 자세 메모..."
            rows={2}
            style={{
              width: "100%",
              background: BG,
              border: `1px solid ${BORDER}`,
              borderRadius: "8px",
              color: TEXT,
              padding: "10px 12px",
              fontSize: "13px",
              resize: "vertical",
              minHeight: "44px",
              lineHeight: 1.5,
            }}
          />
        </div>
      )}
    </div>
  );
}

            <span>{note}</span>

        </button>

        <button
          onClick={onMemoToggle}
          className="tap"
          style={{
            flex: "0 0 auto",
            background: "transparent",
            border: "none",
            color: infoActive ? ACCENT : TEXT_FAINT,
            padding: "6px",
            cursor: "pointer",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            position: "relative",
          }}
        >
          <Info size={16} strokeWidth={2} />
          {hasMemo && !memoOpen && (
            <span
              style={{
                position: "absolute",
                top: "4px",
                right: "4px",
                width: "5px",
                height: "5px",
                borderRadius: "50%",
                background: ACCENT,
              }}
            />
          )}
        </button>

        <div
          onClick={onToggle}
          style={{
            flex: "0 0 auto",
            width: "26px",
            height: "26px",
            borderRadius: "8px",
            border: `1.5px solid ${isDone ? ACCENT : "rgba(255,255,255,0.18)"}`,
            background: isDone ? ACCENT : "transparent",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            cursor: "pointer",
            transition: "all 0.2s",
            boxShadow: isDone ? `0 0 12px ${ACCENT_GLOW}` : "none",
          }}
        >
          {isDone && <Check size={16} color={TEXT_ON_ACCENT} strokeWidth={3.5} />}
        </div>
      </div>

      {memoOpen && (
        <div
          className="slide"
          style={{
            padding: "0 13px 13px",
            borderTop: `1px dashed ${BORDER}`,
            paddingTop: "12px",
          }}
        >
          <textarea
            autoFocus
            value={memo}
            onChange={(e) => onMemoChange(e.target.value)}
            placeholder="실제 한 거 / 느낌..."
            rows={2}
            style={{
              width: "100%",
              background: BG,
              border: `1px solid ${BORDER}`,
              borderRadius: "8px",
              color: TEXT,
              padding: "10px 12px",
              fontSize: "13px",
              resize: "vertical",
              minHeight: "44px",
              lineHeight: 1.5,
            }}
          />
        </div>
      )}
    </div>
  );
}
